<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Search Website</title>
    <link rel="stylesheet" href="recipe.css">

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Search recipes 😋</h1>
            <P>Find delicous recipes by ingredient</P>
        </div>
        <div class="search-section">
            <input 
            type="text"
            id="searchInput"
            placeholder="search by ingredient (e.g chicken, beef)..."
            >
            <button id="searchbtn">Search</button>

        </div>
        <div id="recipecon" class="recipes-grid">

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
